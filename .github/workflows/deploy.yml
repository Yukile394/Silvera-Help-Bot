name: 🚀 Silvera Help Bot — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🟢 Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 🔍 Syntax Kontrolü
        run: node --check src/index.js && node --check src/deploy-commands.js

      - name: ✅ Komut Dosyaları Kontrol
        run: |
          for f in src/commands/*.js; do
            node --check "$f" && echo "✅ $f OK"
          done

      - name: ✅ Event Dosyaları Kontrol
        run: |
          for f in src/events/*.js; do
            node --check "$f" && echo "✅ $f OK"
          done

  deploy-commands:
    name: 📋 Slash Komutları Deploy Et
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🟢 Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 📋 Slash Komutları Kaydet
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: node src/deploy-commands.js
