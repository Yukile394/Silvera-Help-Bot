name: 🚀 Silvera Help Bot — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Elle tetikleme

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # 1. LINT & TEST
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🟢 Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 🔍 Syntax Kontrolü
        run: node --check src/index.js && node --check src/deploy-commands.js

      - name: ✅ Komut Dosyaları Kontrol
        run: |
          for f in src/commands/*.js; do
            node --check "$f" && echo "✅ $f OK"
          done

      - name: ✅ Event Dosyaları Kontrol
        run: |
          for f in src/events/*.js; do
            node --check "$f" && echo "✅ $f OK"
          done

  # ─────────────────────────────────────────
  # 2. DEPLOY (sadece main'e push'ta)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Sunucuya Deploy Et
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🔑 SSH ile Bağlan ve Deploy Et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "📂 Proje dizinine geçiliyor..."
            cd ~/silvera-bot

            echo "📥 Son kodu çekiliyor..."
            git pull origin main

            echo "📦 Bağımlılıklar güncelleniyor..."
            npm ci --omit=dev

            echo "🔄 Bot yeniden başlatılıyor (PM2)..."
            pm2 restart silvera-help-bot --update-env || pm2 start src/index.js --name silvera-help-bot

            echo "💾 PM2 listesi kaydediliyor..."
            pm2 save

            echo "✅ Deploy tamamlandı!"

  # ─────────────────────────────────────────
  # 3. SLASH KOMUT DEPLOY (sadece main'e push'ta)
  # ─────────────────────────────────────────
  deploy-commands:
    name: 📋 Slash Komutları Deploy Et
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🟢 Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 📋 Slash Komutları Kaydet
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: node src/deploy-commands.js

  # ─────────────────────────────────────────
  # 4. DISCORD BİLDİRİM
  # ─────────────────────────────────────────
  notify:
    name: 📣 Discord Bildirimi
    runs-on: ubuntu-latest
    needs: [deploy, deploy-commands]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📣 Başarılı Deploy Bildirimi
        if: needs.deploy.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "✅ Silvera Help Bot Deploy Edildi!"
          description: |
            **Branch:** `main`
            **Commit:** `${{ github.sha }}`
            **Yapan:** ${{ github.actor }}
          color: 0x2ecc71
          username: "GitHub Actions"

      - name: 📣 Başarısız Deploy Bildirimi
        if: needs.deploy.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ Silvera Help Bot Deploy Başarısız!"
          description: |
            **Branch:** `main`
            **Commit:** `${{ github.sha }}`
            **Yapan:** ${{ github.actor }}
            Lütfen Actions loglarını kontrol edin.
          color: 0xe74c3c
          username: "GitHub Actions"
